<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operonix | Control Center</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>OPERONIX <span class="version">v1.0.0</span></h1>
            <div id="connection-status" class="status-offline">OFFLINE</div>
        </header>

        <div class="grid">
            <aside class="panel side-panel">
                <div class="section">
                    <h3>CURRENT CONTEXT</h3>
                    <p class="label">Active App:</p>
                    <div id="active-app" class="value">DETECTING...</div>
                    <p class="label">Window Title:</p>
                    <div id="active-window" class="value-sub">Waiting for interaction...</div>
                </div>

                <div class="section history-section">
                    <h3>ACTION HISTORY</h3>
                    <div id="history-list" class="mini-scroll"></div>
                    <button onclick="fetchHistory()" class="btn-refresh">REFRESH</button>
                </div>
            </aside>

            <main class="panel main-panel">
                <div class="panel-header">
                    <h3>LIVE EVENT BUS</h3>
                    <span class="clear-btn" onclick="document.getElementById('event-log').innerHTML=''">CLEAR</span>
                </div>
                <div id="event-log" class="scroll-box">
                    <div class="sys-msg">> System Standby. Awaiting logic initialization...</div>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
