<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operonix | OS Agent Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>OPERONIX <span>OS AGENT</span></h1>
            <div id="connection-status" class="status-offline">DISCONNECTED</div>
        </header>

        <main class="grid">
            <section class="panel" id="live-stream">
                <h2>🛰️ Live Activity</h2>
                <div id="event-log" class="scroll-box"></div>
            </section>

            <section class="panel" id="history">
                <h2>📜 Action History</h2>
                <div id="history-list" class="scroll-box"></div>
                <button onclick="fetchHistory()" class="refresh-btn">🔄 Refresh History</button>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
